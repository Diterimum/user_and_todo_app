version: "3.9"

services:
  db:
    image: postgres:16
    container_name: todo_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: todo_db
    ports:
      - "5432:5432"

  api:
    build: .
    container_name: todo_api
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/todo_db
    ports:
      - "8000:8000"